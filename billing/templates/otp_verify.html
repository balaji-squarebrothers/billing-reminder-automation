<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .otp-input {
            font-size: 2rem;
            letter-spacing: 0.8rem;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow-sm border-0 text-center p-4 p-md-5" style="max-width: 440px; width: 100%;">

            <div class="mb-3">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
            </div>

            <h4 class="fw-semibold mb-1">Verify Your Identity</h4>
            <p class="text-muted mb-4">
                We sent a 6-digit OTP to your registered email address.<br>
                <small>Valid for 10 minutes.</small>
            </p>

            {% if resent %}
                <div class="alert alert-success py-2">
                    <i class="bi bi-check-circle me-1"></i> New OTP sent to your email.
                </div>
            {% endif %}

            {% if error %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
                </div>
            {% endif %}

            <form method="post" action="{% url 'verify_otp' token %}">
                {% csrf_token %}
                <input
                    type="text"
                    name="otp"
                    maxlength="6"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    autocomplete="one-time-code"
                    class="form-control otp-input mb-4"
                    placeholder="······"
                    autofocus
                    required
                >
                <button type="submit" class="btn btn-danger w-100 mb-3">
                    <i class="bi bi-x-circle me-2"></i>Confirm Termination
                </button>
            </form>

            <form method="post" action="{% url 'resend_otp' token %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-link btn-sm text-muted">
                    <i class="bi bi-arrow-clockwise me-1"></i>Didn't receive it? Resend OTP
                </button>
            </form>

        </div>
    </div>
</body>
</html>
