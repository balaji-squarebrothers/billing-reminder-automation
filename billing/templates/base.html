{% load static %}

<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

        <title>{% block title %} Billing Reminder System {% endblock title %}</title>
    </head>
    
    <body class="bg-light">

        <nav class="navbar bg-white shadow-sm px-4 mb-3">
            <img src="{% static 'billing/images/square-brothers-logo.png' %}" height="40">
            <span class="fw-semibold">Billing Reminder</span>
            <div class="ms-auto">
                <a href="{% url 'invoice_list' %}" class="btn btn-sm btn-outline-primary me-2">Invoices</a>
                <a href="{% url 'template_list' %}" class="btn btn-sm btn-outline-dark">Templates</a>
                <a href="{% url 'notification_list' %}" class="btn btn-sm btn-outline-dark"><i class='bi bi-bell-fill'></i></a>
            </div>
        </nav>

        <div class="container py-4">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
            
            {% block content %}
            {% endblock content %}
        </div>
                
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
